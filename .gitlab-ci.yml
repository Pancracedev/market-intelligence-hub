# GitLab CI/CD — mirrors .github/workflows/ci.yml for lint/tests, and additionally
# replaces the Airflow scheduler with a single hourly GitLab Scheduled Pipeline (Build >
# Pipeline schedules in the GitLab UI) for the serverless deployment path. See
# docs/DEPLOY_SERVERLESS.md for how to configure it.

stages:
  - check
  - run

default:
  image: ghcr.io/astral-sh/uv:python3.11-bookworm-slim

lint-ingestion:
  stage: check
  rules:
    - if: $CI_PIPELINE_SOURCE != "schedule"
  script:
    - cd ingestion && uv sync && uv run ruff check src tests

lint-api:
  stage: check
  rules:
    - if: $CI_PIPELINE_SOURCE != "schedule"
  script:
    - cd api && uv sync && uv run ruff check app tests

test-ingestion:
  stage: check
  rules:
    - if: $CI_PIPELINE_SOURCE != "schedule"
  script:
    - cd ingestion && uv sync && uv run pytest tests -v

test-api:
  stage: check
  rules:
    - if: $CI_PIPELINE_SOURCE != "schedule"
  script:
    - cd api && uv sync && PYTHONPATH=. uv run pytest tests -v

# --- Scheduled jobs (serverless replacement for the Airflow scheduler) ---
#
# Both run on every scheduled pipeline (one hourly schedule is enough - no per-schedule
# CI/CD variable needed, since GitLab's pipeline-schedule-variables UI/API turned out to be
# unreliable in practice). ingestion.cli run-watchers already only processes watchers whose
# own `schedule` field says they're due, so running it hourly regardless is correct as-is.
# run-digest decides for itself whether it's actually digest day/hour before doing anything.

run-watchers:
  stage: run
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
  script:
    - cd ingestion && uv sync --no-dev && uv run python -m ingestion.cli run-watchers

run-digest:
  stage: run
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
  script:
    - >
      if [ "$(date -u +%u)" = "1" ] && [ "$(date -u +%H)" = "06" ]; then
        cd ingestion && uv sync --no-dev && uv run python -m ingestion.cli run-digest;
      else
        echo "Not digest time (Monday 06:00 UTC) - skipping.";
      fi
