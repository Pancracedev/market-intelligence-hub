x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: airflow/Dockerfile
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__FERNET_KEY: "${AIRFLOW__CORE__FERNET_KEY:-}"
    AIRFLOW__WEBSERVER__SECRET_KEY: "${AIRFLOW__WEBSERVER__SECRET_KEY:-change-me-in-production}"
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: "postgresql+psycopg2://${AIRFLOW_DB_USER:-airflow}:${AIRFLOW_DB_PASSWORD:-airflow}@airflow-db:5432/${AIRFLOW_DB_NAME:-airflow}"
    MINIO_ENDPOINT: "minio:9000"
    MINIO_ROOT_USER: "${MINIO_ROOT_USER:-minioadmin}"
    MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:-minioadmin123}"
    MINIO_BUCKET_BRONZE: "${MINIO_BUCKET_BRONZE:-bronze}"
    MINIO_BUCKET_SILVER: "${MINIO_BUCKET_SILVER:-silver}"
    MINIO_BUCKET_GOLD: "${MINIO_BUCKET_GOLD:-gold}"
    APP_DB_USER: "${APP_DB_USER:-app}"
    APP_DB_PASSWORD: "${APP_DB_PASSWORD:-app}"
    APP_DB_NAME: "${APP_DB_NAME:-market_intelligence}"
    APP_DB_HOST: "app-db"
    APP_DB_PORT: "5432"
    SMTP_HOST: "${SMTP_HOST:-}"
    SMTP_PORT: "${SMTP_PORT:-587}"
    SMTP_USER: "${SMTP_USER:-}"
    SMTP_PASSWORD: "${SMTP_PASSWORD:-}"
    SMTP_FROM: "${SMTP_FROM:-}"
    SMTP_USE_TLS: "${SMTP_USE_TLS:-true}"
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - airflow_logs:/opt/airflow/logs
  depends_on:
    airflow-db:
      condition: service_healthy
    minio-init:
      condition: service_completed_successfully
    app-db:
      condition: service_healthy
  networks:
    - mih-network

services:
  app-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: "${APP_DB_USER:-app}"
      POSTGRES_PASSWORD: "${APP_DB_PASSWORD:-app}"
      POSTGRES_DB: "${APP_DB_NAME:-market_intelligence}"
    volumes:
      - app_db_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${APP_DB_USER:-app} -d ${APP_DB_NAME:-market_intelligence}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - mih-network

  airflow-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: "${AIRFLOW_DB_USER:-airflow}"
      POSTGRES_PASSWORD: "${AIRFLOW_DB_PASSWORD:-airflow}"
      POSTGRES_DB: "${AIRFLOW_DB_NAME:-airflow}"
    volumes:
      - airflow_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AIRFLOW_DB_USER:-airflow} -d ${AIRFLOW_DB_NAME:-airflow}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - mih-network

  minio:
    image: minio/minio:RELEASE.2024-07-16T23-46-41Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:-minioadmin}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:-minioadmin123}"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - mih-network

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin123} &&
      mc mb -p local/${MINIO_BUCKET_BRONZE:-bronze} &&
      mc mb -p local/${MINIO_BUCKET_SILVER:-silver} &&
      mc mb -p local/${MINIO_BUCKET_GOLD:-gold} &&
      exit 0
      "
    networks:
      - mih-network

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username admin \
          --password admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com || true
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 10s
      timeout: 10s
      retries: 10

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    environment:
      APP_DB_USER: "${APP_DB_USER:-app}"
      APP_DB_PASSWORD: "${APP_DB_PASSWORD:-app}"
      APP_DB_NAME: "${APP_DB_NAME:-market_intelligence}"
      APP_DB_HOST: "app-db"
      APP_DB_PORT: "5432"
      MINIO_ENDPOINT: "minio:9000"
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:-minioadmin}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:-minioadmin123}"
      MINIO_BUCKET_GOLD: "${MINIO_BUCKET_GOLD:-gold}"
      JWT_SECRET_KEY: "${JWT_SECRET_KEY:-change-me-in-production}"
      SEED_DEMO_USER: "${SEED_DEMO_USER:-true}"
    ports:
      - "8000:8000"
    depends_on:
      app-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - mih-network

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: "http://localhost:8000"
    ports:
      - "3000:3000"
    depends_on:
      - api
    networks:
      - mih-network

networks:
  mih-network:
    driver: bridge

volumes:
  app_db_data:
  airflow_db_data:
  airflow_logs:
  minio_data:
