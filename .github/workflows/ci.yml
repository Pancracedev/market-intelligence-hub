name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "0.5"
      - name: Lint ingestion package
        working-directory: ingestion
        run: |
          uv sync
          uv run ruff check src tests
      - name: Lint API
        working-directory: api
        run: |
          uv sync
          uv run ruff check app tests

  test-ingestion:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "0.5"
      - name: Run tests
        working-directory: ingestion
        run: |
          uv sync
          uv run pytest tests -v

  test-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "0.5"
      - name: Run tests
        working-directory: api
        run: |
          uv sync
          PYTHONPATH=. uv run pytest tests -v

  build:
    runs-on: ubuntu-latest
    needs: [lint, test-ingestion, test-api]
    strategy:
      matrix:
        include:
          - name: airflow
            context: .
            dockerfile: airflow/Dockerfile
          - name: api
            context: ./api
            dockerfile: api/Dockerfile
          - name: dashboard
            context: ./dashboard
            dockerfile: dashboard/Dockerfile
    steps:
      - uses: actions/checkout@v4
      - name: Build ${{ matrix.name }} image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          tags: market-intelligence-hub-${{ matrix.name }}:ci
